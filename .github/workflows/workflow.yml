name: CI/CD Pipeline

# Define quando o workflow deve ser executado
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # Job de CI (Integração Contínua)
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
        options: --bind_ip_all

    steps:
      # Passo 1: Checa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v2

      # Passo 2: Configura o Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'  # Defina a versão do Node.js

      # Passo 3: Instala as dependências
      - name: Install dependencies
        run: npm install

      # Passo 4: Espera o MongoDB inicializar
      - name: Wait for MongoDB to start
        run: sleep 15

      # Passo 5: Executa os testes
      - name: Run tests
        run: npm test

  # Job de CD (Entrega Contínua)
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Checa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v2

      # Passo 2: Configura o Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'

      # Passo 3: Instala as dependências
      - name: Install dependencies
        run: npm install

      # Passo 4: Constrói a aplicação (se aplicável)
      - name: Build project
        run: npm run build

      # Passo 5: Implementa a aplicação (exemplo usando Heroku)
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}  # Use a chave de API do Heroku como segredo
        run: |
          git remote add heroku https://git.heroku.com/<seu-app>.git
          git push heroku main
